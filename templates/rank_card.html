<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            width: 800px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .avatar {
            width: 80px; height: 80px; border-radius: 50%;
            border: 3px solid #FFD700;
            box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }
        .username { font-size: 28px; font-weight: bold; color: white; }
        .level-badge {
            display: inline-block;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 20px;
            padding: 4px 16px;
            margin-top: 8px;
            font-size: 18px;
            font-weight: bold;
            color: #1a1a2e;
        }
        .stats { display: flex; justify-content: space-between; margin-bottom: 12px; color: #a0a0c0; }
        .xp-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
        }
        .xp-progress {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            border-radius: 10px;
        }
        .footer { display: flex; justify-content: space-between; margin-top: 16px; color: #6c6c8e; }
        .rank-badge { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 4px 12px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <img class="avatar" src="{{ avatar_url }}" alt="avatar">
            <div class="user-info">
                <div class="username">{{ username }}</div>
                <div class="level-badge">✨ Lv.{{ level }}</div>
            </div>
        </div>
        <div class="stats">
            <span>📊 经验值</span>
            <span>{{ xp }} / {{ next_xp }}</span>
        </div>
        <div class="xp-bar">
            <div class="xp-progress" style="width: {{ progress }}%;"></div>
        </div>
        <div class="footer">
            <span>🎖️ Rank #{{ rank }}</span>
            <span>{{ server_name }}</span>
        </div>
    </div>
</body>
</html>
